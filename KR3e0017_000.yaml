body:
  text: 銅人針灸經醫家類提要臣等謹案銅人針灸經七卷不著撰人名氏按朝公武讀書後志曰銅人腧穴針灸圖三卷皇朝王惟德撰仁宗嘗詔惟德考次針灸之法鑄銅人為式分臟腑十二經旁注腧穴所㑹刻題其名併為圖法及主療之術刻板傳於世王應麟玉海曰天聖五年十月壬辰醫官院上所鑄腧穴銅人式二詔一置醫官院一置大相國寺仁濟殿先是上以針砭之法𫝊述不同命尚藥奉御王惟一考明堂氣穴經絡之㑹鑄銅人式又纂集舊聞訂正訛謬為銅人腧穴針灸圖經三卷至是上之摹印頒行翰林學士夏竦序所言與朝氏略同惟王惟德作惟一人名小異耳此本卷數不符而大致與二家所言合疑或天聖之舊本而後人析為七卷歟周密齊東野語曰嘗聞舅氏章叔恭云昔倅襄州日嘗獲試針銅人全像以精銅為之腑臟無一不具其外腧穴則錯金書穴名於旁凡背面二器相合則渾然全身蓋舊都用此以試醫士者其法外塗黃蠟中實以水俾醫工以分析寸按穴試針中穴則針入而水出稍差則針不可入矣亦竒巧之器也後趙南仲歸之內府叔恭嘗寫二圖刻梓以𫝊焉今宋銅人及章氏圖皆不𫝊惟此書存其梗概爾乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d01ab3301383d74ed8f0b7af769dd4ca50c6a105d3fe608cefef83c89a2ed6d9
