  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0017_WYG_003-1a, image: WYG0738/WYG0738-0023c.png}
body:
  text: 銅人針灸經卷三神庭一穴在髮際直鼻上督脉上一寸髮際是也足太陽陽明之㑹主治腫氣風癎顛風不識人羊鳴角弓反張披髮而上歌下哭多學人言語驚悸不得安寢禁不可針日灸七壯至百壯若針即發於其病在舉火之時忌猪羊魚肉酒麵熱食曲差二穴在神庭傍一寸半髮際足太陽脉氣所發主心中煩滿汗不出頭項痛身熱目視不明針入三分灸三壯臨泣二穴在目上眥入髮際五分陷者中足太陽少陽之㑹主卒不識人風眩鼻塞針入三分留七呼眉冲二穴一名小竹在當兩眉頭直上入髮際理目五般癎頭痛鼻塞不宜灸針入三分水溝一穴在鼻柱下人中督脉手陽明之㑹主療消渴飲水無多少水氣偏鼻腫失笑無時即顛癎語不識人乍喜乍哭牙關不開面腫唇動葉葉肺風狀如蟲行針入四分徐徐出之灸亦得然不如針若是水氣唯有此穴可針若針他穴水盡即死承漿一穴在頥前下唇下足陽明之㑹主偏風口喎面腫消渴面風口不開口中生瘡針入三分半然後徐徐引氣而出灸亦任日灸七七壯若頻灸恐足陽明脈斷令風不差若停息復灸令其風通宣應時立愈其艾炷依小竹筋頭大作之但令當脉灸之雀糞大亦能愈疾又有一途如脉內疝瘕痃癖塊伏梁氣之徒唯須大艾炷故小品曰腹背爛燒四支則但除風邪而已如鳩尾以至頭皆不可多灸及不可用大艾炷俞府二穴在巨骨下去璇璣傍各二寸陷中足太陽脉氣所發主咳逆上氣喘嘔吐胸滿不得食仰卧取之灸五壯針入三分彧中二穴在俞府下一寸六分陷中仰卧取之足少隂脉氣所發主腎脅支滿咳喘不得息嘔吐胸滿不能食灸五壯針入三分神藏二穴在彧中下一寸六分陷中仰而取之足少陽脉氣所發主胸脅支滿咳嗽不得食針入三分灸五壯靈虛二穴在神藏下一寸六分陷中仰而取之足少陽脉所發主胸脅支滿引胸不得息嘔吐胸滿不得食針入三分灸五壯神封二穴在靈墟下一寸六分主胸滿不得息咳逆乳癰灑浙惡寒灸五壯針入三分步郎二穴在神封下一寸六分陷者中仰取之足少隂脉氣所發主胸脅支滿鼻不通呼吸少氣喘息不得舉臂針入三分灸五壯五處二穴足太陽脉氣所發在頭上督脉傍去上星二寸半主目不明頭眩風痺悶針入三分灸五壯承光二穴在五處後寸半足太陽脉氣所發主風眩頭痛欲嘔吐心煩針入三分不可灸通天二穴在承光後一寸半足太陽脉氣所發主項痛暫起僵仆針入三分灸三壯攢竹二穴在兩眉頭少陷中足太陽脉氣所發主目視􅉩􅉩視物不明眼中熱疼及眼眶針入三分不宜灸晴明二穴在目內眥頭上畔者中手足太陽陽明之㑹主膚翳白膜覆童子眼暗雀目冷尿􅀈􅹩眼視物不明努肉針入一分半不宜灸迎香二穴在和􅀢上一寸鼻下孔傍手足陽明之㑹針入三分主鼻息不聞香臭偏風面癢及面浮腫風葉葉動狀如蟲行刺或在唇動不宜灸承泣二穴在目下七分直目童子中蹻脈任脈足陽明之㑹主療􅹩眼喎目不正口喎目瞤面動葉葉然牽口眼熱疼赤痛目視􅉩􅉩冷泪眼臉赤針入四分半不宜灸若灸尤問多少三日以後眼下大如拳息肉日加長如桃許至一月日如五升大鳩尾一穴在臆前巨骨下五分主心驚煩發狀如烏烏破心吐血心中氣悶不喜聞人語心痛腹脹宜針雖然此處最難針須是大好手方可下針如不然取氣多不幸令人死針入三分巨闕一穴心之募在鳩尾下一寸任脈氣所發主療心中煩悶熱風風癎浪言或作鳥聲不能食無心力凡心痛有數種冷痛蛔蟲毒霍亂不識人針入六分得氣即㵼灸亦良上管一穴在巨闕下一寸去巨骨三寸任脈足陽手太陽之㑹主心中熱煩賁豚氣脹滿不能食霍亂心痛不可眠卧吐利心風驚悸不能食心中悶發噦伏梁氣狀如覆杯針入八分得氣先補而後㵼之可為神驗若是風癎熱痛宣㵼之後補可為應其病灸亦良中管一穴一名太倉是胃之募在上管下手太陽少陽足陽明所生任脈之㑹主治心匿不能食反胃霍亂心痛熱溫虐痎虐天行傷寒因讀書得奔豚氣心悶伏梁氣如覆杯冷結氣針入八分灸亦良建里一穴在中管下一寸治腸中疼痛嘔逆上氣心痛身腫針入一寸三分灸亦良下管一穴在建里下一寸足太陰任脈之㑹主腹胃不調腹內痛不能食小便赤腹堅硬癖瑰脈厥厥動針入八分灸亦佳神聰四穴在百㑹四面各相去同身寸一寸理頭風目眩狂亂風癎左手如花右手如果針入三分明堂一穴在鼻直上入髮際一寸理頭風多鼻涕鼻塞三日一報針入三分當陽二穴在當童人直上入髮際一寸理卒識人風眩鼻塞入針三分前關二穴在目後半寸亦近太陽之穴理風赤眼痛頭目眩目澀針入三分四白二穴在目下一寸足陽明脉氣所發主頭痛目眩針入三分灸七壯巨闕二穴在鼻孔下俠水溝傍蹻脉足陽明之㑹主治面風寒鼻頻音凖上腫癰痛招搖視占瘈瘲口噼針入三分灸七壯止地倉二穴在俠口傍四分外如近下有脉微動者是蹻脉手陽明之交主療大患風者其脉亦有動時亦有不動時多主偏風口喎灸音不言不得飲水漿食漏落脉瞤動患左針右患右針左針入三分半灸亦得日二七壯其艾壯如粗叉腳忌毒物及行房事廉泉一穴在頷下結喉上舌本間隂維任脉之㑹主舌下腫難言舌瘲設多咳嗽少氣喘息嘔沫禁斷灸三壯針入三分隂交一穴在臍下一寸任脉氣所發主臍下熱小便赤氣痛狀如刀攪作塊狀如覆杯婦人斷緒月事不調帶下崩中因産後惡露不止繞臍冷痛針入八分得氣即㵼㵼後宜補灸亦得然不及針水分一穴在管下臍上一寸任脈氣所發主腹痛不能食腸堅腹痛胃管不調堅硬針入八分若是水病灸之大良巨闕一穴甲乙經云一名利機一名精露一名丹田一名命門在臍下二寸是三焦之募任脈氣所發針入八分主腹痛堅硬婦人因産惡露不止遂成結塊崩中斷緒灸亦良關元一穴是小腸募一名次門在臍下三寸足三陰任脈之㑹臍下㽲痛小便赤淋不覺遺瀝小便處痛狀如散火尿如血色臍下結血狀如覆杯婦人帶下因産露不止并婦人斷緒産道冷針入八分若懷胎必不針若針必落胎胎多不出而針外崑崙即出灸亦良然不及針中極一穴一名玉泉一名氣原在關元下一寸是膀胱募任脈足三陰之㑹主婦人斷緒四度針針即有子故却時任針也主淋小便赤尿道痛臍下結塊如覆杯或因産得惡露不止遂成疝瘕或因月事不調血結成塊針入八分灸亦得然不及針銅人針灸經卷三
