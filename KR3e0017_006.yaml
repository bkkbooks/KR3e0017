front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0017_WYG_006-1a, image: WYG0738/WYG0738-0040c.png}
body:
  text: 銅人針灸經卷六角孫二穴在耳郭中間開口有穴手足少陽手太陽之會主齒不嚼物齲動腫灸三壯針入三分耳門二穴在耳前起肉當耳缺者主耳有膿及底耳䁎耳耳痛鳴聾并齒齲針入三分灸三壯聽會二穴在耳前陷中上關下一寸動脈宛宛中張口得之手少陽脈氣所發針入三分主耳聾耳中狀如彈聲通耳牙車急疼痛不得嚼食牙車脫臼相離一寸其穴側卧張口得之灸亦良天牖二穴在頸筋缺盆上天容後天柱前完骨下髮際上一寸陷者宛宛中手少陽氣所發主頭風面腫項強不得回轉夜夢顛倒面青黃無顔色針入五分不宜灸若灸面腫滿合先取譩嘻後針天牖風池其病即差天府二穴在兩腋下三寸宛宛中手太隂脈氣所發主頭眩目瞑遠視􅉩􅉩針入四分灸入七壯不除再灸百壯甲乙經禁灸曲澤二穴者水也在肘內廉下陷者中屈肘得之手心主脈之所入為合也主心痛出穴則心下淡淡喜驚身熱煩心口乾逆氣嘔血時瘈瘲言搖頭青汗出不過肩傷寒病溫溫身熱口乾灸三壯針入三分少海二穴者水也一名曲節手少隂脈之所入為合也在肘內橫文頭屈手向頭取之陷者宛宛中甲乙經云穴在肘內廉節後陷者中動應手療腋下瘰癧痺疼屈伸不得風痺疼疰病針入三分禁灸巨虛上廉二穴在三里三寸兩筋兩骨罅間陷者宛宛中足陽明與太陽合針入八分主大腸氣不足偏風腰腿腳不隨不得履地腳氣刺風痶風腳冷寒瘧灸之太良條口二穴在上廉下一寸陽明脈氣所發主脛寒不得卧疼痛足緩失履濕痺足下熱不能久立針入八分灸三壯巨虛下廉二穴足陽明與小腸合在上廉下三寸兩筋兩骨罅陷者宛宛中蹲地坐而取之針入六分又針入三分灸三壯主小腸氣不足面無顔色偏風熱風冷痺不遂風濕痺灸亦良不及針灸瘡差冷痺即已承山二穴一名魚腹山一名傷山在兌踹腸下分肉間陷者中定腹取之主腳弱無力腳重偏風不遂針入八分灸亦得上崑崙二穴者火足太陽脈之所行為經也在外踝後跟骨上陷者中治惡血風氣腫痛腳腫水針入五分灸三壯下崑崙二穴一名內崑崙在外踝下一寸大筋後內陷骨宛宛中主刺風􅀈風熱風冷痺腰疼偏風半身不遂腳重疼不履地針入四分灸之亦良其穴蹲地旁引刺之灸百壯止聽宫二穴在耳中珠子大如赤小豆形足少陽手太陽三脈之會針入一分灸三壯主耳聾填如無所聞嘬嘬嘈嘈彈鳴及心腸滿臂痛失聲缺盆上二穴肩上橫骨陷中一名天蓋肩上是穴主寒熱瘰癧缺盆中腫外潰不死胸中熱滿腹大小氣缺盆中痛汗出喉痺咳嗽灸三壯針入三分孔最二穴在腕上七寸手太隂郤治熱病汗不出吐血失瘖腫痛惡血針入三分灸亦得列缺二穴在腕上一寸半交叉頭兩筋兩骨罅宛宛中手太隂絡主療偏風口喎半身不遂針入三分灸亦得若患偏風灸至一百壯若患腕勞灸至妙經渠二穴者金也在寸口中陷者中手太隂脈之所行為經也主寒熱胸背急痛胸中膨膨痛喉痺掌中熱主咳逆上氣喘數久熱病汗不出暴疸喘逆心痛欲嘔針入三分不可灸即傷人神少沖二穴者木也一名經如在手小指內廉之端去甲如韭葉手少隂脈之所出為井也主熱病煩心上氣心痛冷煩滿少氣悲恐喜驚掌熱肘腋胸中痛口中熱咽中酸乍寒熱手拳不伸掌痛引腋針入一分灸一壯勞宫二穴者火也一名五里在掌中央橫文動脈中以屈無名指頭著處是手中主脈之所流為營也主手掌後􅍙痺手痺白屑起針入二分只過一度如過兩度令人虛不得灸灸即生息肉髀關二穴在膝上伏兔後交分中主脈寒不仁痺痿不屈伸也灸三壯針入三分梁丘二穴足陽明郤在膝上三寸兩筋間治大驚脛痛冷痺膝痛不能伸屈針入五分隱白二穴者木也足大指端內側去瓜甲角如韭葉宛宛中足太隂脈之所出為井主腹中有寒熱起氣喘衄血不止腹中脹逆脛中寒熱不得卧氣滿胸中熱暴泄鬲中嘔吐不欲食飲渴尸厥不知人脈動如渴飲身體疼痛唾也針入一分灸三壯承筋二穴一名踹腸一名直腸在脛後從腳跟後上七寸踹中央陷者中足太陽脈氣所發治風勞熱足煩腫痛轉筋急痛身隱疹大小便不止針入三分陽蹻二穴在外髁前一寸陷者宛宛中治腳氣腎氣婦人血氣針入三分隂蹻二穴在足內踝陷者中宛宛是卒疝小腹痛病者左取右右取左立已女子不月水驚喜悲不樂如墮墜汗出面黑病飢不欲食婦人淋瀝隂挺出四支淫濼心悶暴虐及諸淋目痛小腹偏痛嘔逆嗜卧偏枯不能行大風暴不知人卧驚視如見星尿如黃水小腹熱咽乾也灸三壯針入三分風府一穴本在項後入髮際一寸大筋上宛宛中起肉疾言其肉立起言休立下督脈陽維之會不可灸針入三分主頭項急不可傾側目眩鼻窒不得息瘖不能言嗌痛足不仁狂走欲自殺目反妄視瘈脈二穴一名資脈在耳內雞足青脈是穴主頭風耳後痛小兒驚癎瘈瘲嘔吐泄注驚恐失精視瞻不明眩瞢灸三壯針入一分清冷淵二穴在肘上二寸伸肘舉臂取之主肩不舉不得帶衣灸三壯針入三分消濼二穴在肩下外關腋針肘分下行主寒熱風痺頭痛頭背急針入六分灸三壯肩外俞二穴在肩脾上廉去脊三寸陷者中主肩甲痛熱而寒至肘灸一壯針入六分曲垣二穴在肩中央曲甲陷者中按之應手痛是穴主肩痛周痺灸三壯針入九分二間一穴者水也一名間谷在手太指次指本節前內側陷者中手陽明脈之所流為營也主喉痺多卧喜睡肩髃喉痺咽如眥物傷忽振寒針入三分灸三壯三間二穴者木也一名少谷在手大指次指本節之後內側陷者中手陽明脈之所注為俞也主喉痺咽如骨鯁齒齲痛多卧喜睡胸滿腹鳴虛寒熱唇口乾身熱喘息目急痛針入三分少澤二穴者金也一名少吉在手小指端去爪甲下一分陷者中手太陽脈之所出為井也主虐寒熱汗不出頭痛咳嗽瘈瘲口乾頭痛不可顧也針入一分灸一壯前谷二穴者水也在手小指外側本節前陷者中手太陽脈之所流營也刺入一分灸三壯主目眩淫淫轉甲小指痛陽谷二穴者火也在手外側腕中兌骨之下陷者中手太陽脈之所行為經也主顛疾狂走熱病汗不出脅痛頸腫寒熱耳聾耳鳴牙齒齲痛臂腕外側痛不舉吐舌戾頸妄言不得左右顧俯瘈瘲頭眩眼痛針入二分灸三壯飛陽二穴一名厥陽足太陽絡在外踝上七寸别走少隂者刺入三分灸三壯主頭眩目痛束骨二穴者木也在足小脂外本節後陷者中足太陽脈之所注為俞也刺入三分灸三壯主頭痛目眩身熱肌肉動湧泉二穴者木也一名地沖在足心陷者中屈足捲指宛宛中足少隂脈之所出為并也主小便不利心中結熱腳底白肉際不得履地刺風脈風風癎灸亦得然不及針者灸廢人行動不可傳之於後針入五分膝眼四穴在膝頭骨下兩傍陷者宛宛中是穴針入五分留三呼㵼五吸主膝冷疼痛不已禁灸銅人針灸經卷六
