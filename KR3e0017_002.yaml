body:
  text: 銅人鍼灸經卷二今具列一十二人形共計二百九十穴上星一穴在額顱上直鼻中央入髪際一寸䧟容豆是穴督脉氣所發主療頭風頭腫皮腫而虚鼻塞頭痛針入二分留十呼㵼五吸針下氣盡更停針引之得氣即㵼灸亦得然不及針日灸三壯至百五壯罷不宜多灸湏停十餘日然後更灸若頻灸恐㧞氣大上令人眼暗故不用相續加灸滿五十壯即以細三稜針刺頭上令宣通熱氣者熱不止熱氣上冲頭痛也戒酒麵蕎麥𩕄㑹一穴在上星上一寸陷者中是穴督脈氣所發主療鼻塞日灸二七壯至七日停初灸之時痛五十壯即不痛至七十壯或痛即停灸其鼻塞若灸至四日便當漸可至七日即差針入二分留三呼得氣即㵼主療頭風痛白屑起多睡針之彌佳針訖可用末鹽生麻油相和以揩髮根下􅀈頭悉塗數數用此即末無頭風八嵗以上方可針𩕄門未合若針不幸令人死忌蕎麥熱食猪肉前頂一穴在𩕄㑹上一寸五分骨陷中是甄權針經云一寸是穴今依素問一寸五分為定督脈氣所發主療頭風熱痛頭腫風癎針入三分留七呼㵼五吸大腫極即以三稜針刺之遶四方一寸以下其頭痛腫立差復以鹽末生麻油揩髮際下灸亦得百㑹一穴在前頂後一寸半頂中心督脈足大陽之㑹主療脱肛風癎青風心風弓角反張羊鳴多哭言語不擇發時即死吐沫心中熱悶頭風多睡心煩驚悸無心力志前失後喫食無味頭重飲酒面赤鼻塞針入二分得氣即㵼如灸數至百五即停三五日訖繞四畔以三稜針刺令出血以井花水淋之令氣宣通不得一向火灸恐拔氣上令人眼暗忌酒麵猪魚蕎麥蒜􅀢等天突一穴在結喉下陷者中宛宛是陰維任脈之㑹針入五分留三呼得氣即㵼主欬嗽上氣噎胷中氣喉内狀如水雞聲肺壅唾膿血氣壅不通喉中熱瘡不得下食灸亦得然不及針其下針直横下不得􅀈手即五臟之氣傷令人短夀慎加藥法及辛酸滑等璇璣一穴在天突下一寸陷者中仰頭取之是穴任脈氣所發主胷支滿痛喉痺咽癰水漿不下灸五壯針入三分華盖一穴在璇璣下一寸陷中仰而取之任脈氣所發主胸脇支滿痛引胸中欬逆上氣喘不能言灸五壯針入三分紫宫一穴在華葢一寸六分陷者中仰而取之任脈氣所發主胷脇支滿痺痛骨疼飲食不下嘔逆上氣煩心也灸五壯針入三分玉堂一穴在紫宫下一寸六分陷中一名玉英任脈氣所發主胸滿不得喘息痺痛骨疼嘔逆上氣煩心灸五壯針入三分亶中一穴一名元兒在玉堂下一寸六分横直兩乳間陷者中任脈氣所發宜灸至七七止主肺癰咳嗽上氣唾膿不得下食胷中氣滿如塞禁穴不可針針不幸令人死中庭一穴在亶中下一寸六分陷中任脈氣所發主胷脇支滿心下滿食飲不下嘔逆吐食還出灸五壯針入三分巨骨一穴在心脾骨頭不可日灸三壯至七壯主驚癎破心吐血禁針針則倒懸一食頃然後乃可下針針入四分㵼之勿補針出始得正坐忌酒麵熱食猪魚生冷物雲門二穴在巨骨下氣户兩傍各二寸陷中動脈應手舉臂取之山晀經云在人迎下第二骨間相去二寸三分足太陰脈氣所發治嘔逆氣上胷脇徹背痛通灸禁針理肺同藥療之針深令人氣逆少商者木也在手大指端側去爪甲角如韮葉白肉際宛宛中手大隂脈之為井也針入一分主不能食腹中氣滿喫食無味宜針不宜灸以三稜針刺之血出勝氣之所以勝氣針者此脈脹腮之候腮中有氣人不能食故刺出血以宣諸藏暌也忌冷熱食魚際二穴者火也在手大指節後内側散脈中手太陰之所流為營也主虛熱洒洒毛豎惡風寒舌上黄身熱咳嗽喘痺走背胷不得息頭痛甚汗不出熱煩心少氣不足以息陰痒腹痛不下食時攣支滿喉中焦乾渴痙上氣熱病寒栗鼓頷腹滿陰瘻色不變肺心痛牽引尻溺出膈中虚食飲嘔身熱汗出重嘔吐血日泣出短氣心痺悲怒逆氣任惕胃氣逆也針入二分銅人鍼灸經卷二
