front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0017_WYG_004-1a, image: WYG0738/WYG0738-0029a.png}
body:
  text: 銅人針灸經卷四後頂一穴在百會後一寸半枕骨上是督脈氣所發針入四分灸五壯主風眩目視􅉩􅉩額顱上痛強間一穴在後頂後一寸半一名大羽是督脈氣所發主頭如針刺不可以動項如拔不可左右顧視灸五壯針入二分腦户一穴在枕骨上強間後一寸半一名仰風一名會顱是督脈足太陽之會主目痛不能視面赤腫頭痛不得灸灸令人失瘖針入三分瘖門一穴一名舌厭在項後入髮際宛宛中入係舌本是督脈陽維之會仰而取之主頭風腦疼失瘖不能言舌急項強不能回頭針入八分徐徐出之不宜灸灸即令人啞忌如前法問曰舌急不言如何治答曰急針瘖門舌緩針風府得氣即㵼可小繞針入八分忌灸大推一穴第一推上陷者中宛宛是主三陽督脈之會療五勞七傷溫瘧疰􅂒膊悶項強不得四顧針入五分灸亦得陶道一穴在大推節下間俯而取之督脈足太陽之會主頭重目瞑灑浙寒熱脊強以頭汗不出也灸五壯針入五分身柱一穴在第三椎節下間督脈氣所發灸五壯主顛疾瘈瘲怒欲殺人身熱狂走讝言見鬼針入五分神道一穴督脈氣所發在第五椎節下間俯而取之主寒熱頭痛進退往來痎瘧恍惚悲愁灸入三壯針入五分至陽一穴在第七椎節下間俯而取之督脈氣所發主寒熱解爛淫樂脛酸四支重痛少氣難言灸三壯針入五分筋縮一穴在第九椎節下間俯而取之督脈氣所發主驚癎狂走顛疾脊急強目轉上垂灸三壯針入五分脊俞一穴一名神宗一名脊中在第十一椎中中央督脈氣所發治風癎顛邪溫病積聚下利忌灸針入五分懸區一穴在第十二椎下節間是穴督脈氣所發主腰脊強腹中上下積氣針入三分灸三壯命門一穴一名屬纍在第十四椎下節俯而取之督脈氣所發主頭痛如破身熱如火汗不出瘈瘲裏急腰腹相引痛針五分腰俞一穴一名背解一名髓孔一名腰尸在第二十一椎節下陷者宛宛中是挺腹地舒身兩手兩重支額縱四體然後乃取其穴是督脈氣所發也主腰髖疼痛腰脊強強二不得回轉溫瘧痎嗽針入八分灸亦得慎房事不得擎重物甲乙經云針入五分灸三壯長強一穴一名氣之隂郤督脈絡在窮骨下宛宛中是甲乙經穴在脊骶端少隂所結主下漏五痔疳蝕下部慝針入三分然針之以痛為度其穴伏地取之乃得灸亦得然不及針慎房事此痔根本是冷慎冷天柱二穴在俠項後髮際大筋外亷陷者中足太陽脈氣所發針入二分主頭風目如脫項如拔項疼急重先㵼而後補之灸亦得然不及針玉枕二穴在絡却後七分半俠腦户傍一寸三分起肉枕骨上入髮際三寸足太陽脈氣所發針入三分灸三壯主目內攣絲急痛風眩目痛頭寒多汗耳聾鼻塞風池二穴者是足少陽陽維之會在項後髮際陷中甲乙經云風池穴在顳顱後髮際陷中針入一寸二分大患風者先補而後㵼少可患者以經取之主肺風面赤目視􅉩􅉩項強不得回顧面腫皮軟腦疼痛灸亦良然不及針問曰如後髮際亦有項腳長者其毛首至頭骨亦有無項腳者毛齊至天牖穴即無毛根何而取穴也答曰其毛不可輒定大約如此若的的定中府正相當即是側相去各二寸此之定穴顱息二穴在耳後青脈間主身熱頭痛不可反側小兒癎喘不得息耳聾針入一分不得多出血血多即殺人灸三壯完骨二穴在耳後入髮際四寸足太陽少陽之會主風眩項痛頭強寒熱灸即依年壯針入二分大抒二穴在項後第一椎下兩傍各一寸半陷中足太陽手少陽之會理風勞氣咳嗽氣急頭痛目眩腹痛針入五分禁灸風門熱府二穴在第二椎下兩傍一寸半督脈足太陽之會理傷寒項強目瞑鼻塞風勞嘔逆上氣胸痛背痛氣短不安針入五分灸五壯肺俞二穴在第三椎下兩傍相去一寸半理顛癎癭氣上氣吐逆支滿脊強寒熱不食肉痛皮癢傳尸骨蒸肺嗽針入三分厥隂俞二穴在第四椎下兩傍相去同身寸一寸半理逆氣嘔逆牙痛留結胸悶針入三分心俞二穴在第五椎下兩傍各一寸半理心中風狂癎心氣亂語悲泣心腹煩滿汗不出結聚寒􅠰嘔逆不食食即吐血目痛不可灸針入三分督俞二穴在第六椎下兩傍相去同身寸一寸半一名髙蓋主理寒熱腹中痛雷鳴氣逆心痛灸三壯禁針鬲俞二穴在第七椎下兩傍各一寸半理心痛痰飲吐逆汗出寒熱骨痛虛脹支滿痰瘧痎癖氣塊隔上痛喉痺身常溫不食切痛針入三分肝俞二穴在第九椎下兩傍合一寸半理口乾中風支滿短氣不食食不消吐血目不明閉塞腰痛肩疼寒疝針入三分灸三壯膽俞二穴在第十椎下兩傍各一寸半足太陽脈氣所發主理心脹滿吐逆短氣痰悶食難下不消針入三分脾俞二穴在第十一椎下兩傍一寸半理腰身黃脹滿腹肚泄利身重四支不收黃疸邪氣積聚腹病寒熱針入三分灸三壯胃俞二穴在第十二椎下兩傍各一寸半理煩滿吐食腹脹不能食針入二分灸三壯三焦俞二穴在第十三椎下兩傍各一寸半足太陽脈氣所發主水穀不消腹脹腰痛吐逆針入三分灸三壯腎俞二穴在第十四椎下兩傍各一寸半與臍對理虛勞耳聾腎虛及水藏脹攣急腰痛小便濁隂中疼血精出五勞七傷冷嘔腳膝拘急好獨卧身腫如水針入三分灸三壯氣海俞二穴在第十五椎下兩傍同身寸相去一寸半理腰痛痔病㵼血灸三壯大腸俞二穴在第十六椎下兩傍各一寸半理腰痛腸鳴脹滿繞臍中痛大便下利或泄利食不化脊骨強針入三分灸三壯關元二穴在第十七椎下兩傍相去同身寸一寸半理風勞腰痛泄利虛脹小便難婦人瘕聚諸疾針入三分小腸俞二穴在第十八椎下兩傍各一寸半理大便赤澀小便緊急腳腫短氣不食煩熱㽱病大便膿血出食痔疼痛婦人帶下針入三分灸三壯膀胱俞二穴在第十九椎下兩傍相去同身寸一寸半理風勞腰痛泄利腸痛大小便難尿赤隂生瘡少氣足脛冷拘急不得屈伸女人瘕聚針入三分灸三壯中膂俞二穴在第二十椎下兩傍相去同身寸一寸五分一名脊內俞是少隂脈理理赤白痢虛渴汗出腰不得俯仰腹脹脅痛針入三分白環俞二穴在第二十一椎下兩傍相去同身寸一寸半足太陽脈氣所發理腰脊攣急痛大小便不利百病針入三分甲乙經甄權經云挺腹地端身兩手相重支額縱氣息令支肉俱緩乃取其穴針入八分主腰髖疼不遂溫虐腰中冷不識眠睡勞損風虐忌灸銅人針灸經卷四
