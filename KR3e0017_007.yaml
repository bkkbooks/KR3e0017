body:
  text: 銅人針灸經卷七針灸吉日丁卯庚午甲戌丙子壬午甲申丁亥辛卯壬辰丙申戊戌己亥己未庚子辛丑甲辰乙巳丙午戊申壬子癸丑乙卯丙辰壬戌丙戌以上並吉又宜用除日破日開日天醫要安並吉針灸忌日丁丑及白虎血忌血支月厭月殺月刑死别獨火凶又男忌除日女忌破日十干日不治病甲不治頭乙不治喉丙不治肩丁不治心戊己不治腹庚不治腰辛不治膝壬不治脛癸不治足十干日不針灸甲日頭乙日耳丙日肩丁日背戊巳日腹脾庚日肺腰辛日膝壬日腎經癸日手足此神農所制一歲起坤二嵗震逐年順飛九宫周而復始行年到處則所主敗體切忌針灸如誤犯之必致喪命或發癰疽宜速治之一歲起心二歲喉逐歲依次順行一部終而復始行年所值者切忌針灸一歲起臍二歲心逐歲順行周而復始行所值處忌針灸所録見明堂經推四時大乙所在云六腑鬲下三藏應四季中州其有戊巳日大禁大乙所在忌針灸左足應立春日其日戊子己丑左胸應春分其日乙卯左手應立夏日戊辰己巳頭一應夏至其日丙午右手應立秋日戊申己未右胸應秋分其日辛右足應立冬日戊戌己亥腰尻丁竅應冬至丙午推四時人神所在春左脅夏臍秋右脅冬腰推三旬人神在誤針灸者各致其疾初一在足大指厥隂分針之主發附腫初二在外踝少陽分針之經筋緩初三在股少隂分針之主小腹痛初四在腰太陽分針之主腰僂無力初五在口太隂分針之主舌强初六在太咽半陽明分針之咽門不開初七在內踝少隂分針之隂經筋急初八在手腕太陽分針灸腕不收初九在尻厥隂分針灸之病結初十在背腰太陽分針灸之腰背僂十一在鼻柱陽明分針灸之齒面腫十二在髮際少陽分針之耳重聽十三在牙齒少隂分針灸之氣寒十四在胃腕陽明分針之氣脹十五在遍身不補不㵼大忌針灸十六在胸太隂分針之遞息十七在氣衝陽明分針之難息十八在股內少隂分針之引隂氣痛十九在足陽明分針之發腫二十在內踝少隂分針之經脉亦手二十一在手小指太陽分針之手不仁二十二在外踝少陽分針之筋經緩三十三在肝及足厥隂分針之發轉筋二十四在手陽明分針灸咽中不利二十五在足陽明分針之胃氣脹二十六在胸太陽分針灸之令人喘嗽二十七在膝陽明分針之足經厥逆二十八在隂少隂分針之小腹急疼二十九在膝脛厥隂分針之筋痿少力三十在足跌陽明分日空亡不㵼忌針推十二支人神所在處忌針灸子日在目丑日在脾一云耳寅日在胸卯日在脾一云胸辰日在巳日在手午日在心未日在手一云頭申日在頭一云背酉日在背戌日在面一云頸亥日在云推十二時人神子時在踝丑時在腰寅時在目卯時在面辰時在頭巳時在手午時在胸未時在腹申時在心酉時在背戌時在項亥時在股量穴法凡量穴當以病人手中指第二節兩橫文相去之間為寸凡㸃穴時須要身平正不可拳曲切須慎之灸艾雜說凡灸文皆以日正午以後方可下火灸謂隂氣未至灸無不著午前平旦穀氣虛令人癲眩不可卧灸謹之謹之大槩如此卒急者又不可拘此若遇隂霧大起風雪忽降猛雨灸暑雷電虹霓且暫停候晴明可方下火灸時不得傷飽大饑飲酒生硬物兼不可思慮憂愁呼罵嘆息一切不祥切須忌之銅人針灸經卷七
