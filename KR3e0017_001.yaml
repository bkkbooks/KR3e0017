body:
  text: 銅人鍼灸經卷一夫黄帝正經者是先聖之遺教乃後人之令範是以先明流注孔穴靡不指的其源若或茍從異説恐乖正理之言其十三經脈者皆有俞原手足陰陽之交㑹血氣之流通外營指節内連臟腑故經云手三陽之脈從手至頭手三陰之脈從手至胷足三陽之脈從足至頭足三陰之脈從足至胷是謂日夜循環陰陽㑹合又曰春夏刺淺秋冬刺深緣春夏陽氣在上人氣亦在上故當淺取之秋冬陽氣在下人氣亦在下故當深取之是以春夏各致一陰秋冬各致一陽者也然春夏温必致一陰者初下針沉之至腎肝之部得氣乃引持之陰也秋冬寒必致一陽者乃初内針淺而浮之至心肺之部得氣而内之陽也是謂春夏必致一陰秋冬必致一陽者也凡孔穴流注所出為井所流為營所注為俞所過為原所行為經所入為合此針之大法也春刺井夏刺營仲夏刺俞秋冬刺合也營出少商為井手太隂脈也流於魚際為營注於太泉為俞過於列缺為原行於經渠為經入於尺澤為合心出中冲為井手少隂脈也流於勞宫為營注於大陵為俞過於内關為原行於間使為經入於曲澤為合心包絡脈手厥隂之脈也出於少冲為井流於少府為營注於神門為俞過於通理為原行於靈道為經入於少海為合大腸出於商陽為井手陽明脈也流於二間為營注於三間為俞過於合谷為原行於陽溪為經入於曲池為合三焦出於闗冲為井手少陽脈也流於液門為營注於中渚為俞過於陽池為原行於支渠為經入於天井為合小腸出於少澤為井手太陽脉也流於前谷為營注於後溪為俞過於腕谷為原行於陽谷為經入於少海為合手三隂三陽流注者胃出於厲兑為井足陽明脈也流於内庭為營注於陷谷為俞過於冲陽為原行於解谿為經入於三里為合膽出於竅隂為井足少陽脈也流於俠谿為營注於臨泣為俞過於丘墟為原行於陽輔為經入於陽陵泉為合膀胱出於至隂為井足大陽脈也流於通谷為營注於束骨為俞過於京骨為原行於崑崙為經入於委中為合脾出於隱白為井足大陰脈也流於大都為營注於太白為俞過於公孫為原行於商丘為經入於隂陵泉為合肝出大敦為井足厥陰脈也流於行間為營注於太冲為俞過於中封為原行於中都為經入於曲泉為合腎出湧泉為并足少隂脈也流於然谷為營注於太谿為俞過於水泉為原行於復溜為經入於陰谷為合足三隂三陽所流注者又云能知迎隨之氣可令調氣調氣之方者必在陰陽然所謂迎隨者知榮衛之流行經絡之往來也隨其順逆而取之故曰迎隨調氣之方必在隂陽者知其表裏隨其隂陽而調之故曰調氣之方必在隂陽者也夫用針刺刺者須明其孔穴補虛㵼實送堅付軟以急隨緩榮衛常行勿失其理故經云虚者補之實者㵼之不虚不實以經取之然虚者補其母實者㵼其子當先補而後㵼不實不虚以經取穴者然是正經目中他邪當自取其經故言以經取之又云刺營無傷於衛刺衛無傷於營然針陽者卧針而刺之刺陰者先以左手捻按所針營俞之處候氣散乃内針是謂刺營無傷於衛刺衛無傷於營也又云東方實西方虚瀉南方補北方者然是金水木火土當於相平也緣東方木西方金木欲實金當平之火欲實水當平之東方者肝也則知肝實西方者肺也則知肺虚㵼南方補北方者南方火火者木之子北方水水者木之母水勝火子能令母實母令子虚故㵼火補水欲令金不得平木也經言不能治其虚何問其餘此之謂也又曰夫言氣實者熱也氣虚者寒也針實者以右手持針左手捻按開針穴以㵼之虚者以左手閉針穴以補之補㵼之時與氣開闔相應是謂針容一豆補㵼之理也又云虚者徐而疾實者疾而徐徐即是㵼疾即是補補㵼之法一依此也下針之時搯取穴置針於營上三十六息以左搯穴令定法其地不動右手持針象其天而運轉也於此三十六息然定得針右手存意捻針左手搯穴可重五兩已來計其針如轉如不轉徐徐下之若覺痛即可重二兩若不覺以經下之入人營至衛至病得氣如鮪魚食釣即得其病氣也量其輕重以經取之名曰疾徐者至病即得氣欲出針時子午緩緩出而引病氣不絶名曰徐也旣引氣名一向無補名之曰㵼問曰凡下針時若為是好答曰徐徐下之堅持為實凡下針先須持針堅得安稔不用飽食亦不用空肚如患人欲針針者有乘車來者有步行來者如人行十里許須令坐息安神定氣乘車者如人行三里許患人嘿嘿而不言安心大坐候氣脈安定乃可下針又云夫針之者不胷身心口如銜索曰欲内視消息氣而不得妄行針針入一分知天地之氣針入二分知呼吸之氣針入三分知逆順之氣針皮毛者無傷肌肉針肌肉者無傷筋脈針筋脈者無傷骨髓針骨髓者無傷諸絡東方甲乙木主人筋膜南方丙丁火主人血脈西方庚辛金主人皮毛北方壬癸水主人骨髓中央戊己土主人肌肉針傷筋膜者令人愕視失魂針傷血脈者令人煩亂失神針傷皮毛者令人上氣失魄針傷骨髓者令人呻吟失志針傷肌肉者令人四肢不收失智也刺若中心一日死刺若中肝五日死刺若中腎六日死刺若中肺三日死刺若中脾十日死刺若中膽一日半死又云無刺大醉無刺大怒無刺大勞無刺大飽無刺大饑無刺大渴無刺大驚已上古之深戒也又黄帝問岐伯曰余聞九針之名上應天地四時陰陽願聞其方𫝊於後代岐伯對曰九針者一曰鑱針二曰圓針三曰鍉針四曰鋒針五曰䤵針六曰丸利針七曰毫針八曰長針九曰大針此乃九針之名九針所應一天二地三人四時五音六律七星八風九野人之身形示應之也各有所宜人皮應天人肉應地人脈應人人筋應四時人聲應音人陰陽合氣應律人齒面目應星人出入氣應風人九竅三百六十五絡應九野故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣此之謂各有所立也黄帝問曰人生有形不離陰陽天地合氣别為九野分為四時月有小大日有長短長萬物並至不可勝量虚實呿吟敢問其方岐伯曰木得金而伐火得水而滅土得木而達金得火而缺水得土而絶萬物盡然不可勝竭故針有懸布天下者五黔首其餘食莫知之也一曰治神二曰知養身三曰知毒藥為真四曰制砭石小大五曰知府藏血氣之診五法俱立各有所先今末世之刺也虚者實之滿者泄之此皆衆工所共知也若夫法天則地隨應而動和之者若響隨之者若影道無鬼神獨往黄帝曰願聞其道岐伯曰凡刺之真必先治神五臟已定九候已備乃後存針衆脈不見衆凶弗聞外内相得無以形先可玩往來乃施於人人有虚實五虚勿近五實勿逺至其當發間不容瞚手動若務針耀而匀静意視義觀適之變是謂𡨕𡨕莫知其形見其烏烏見其稷稷從見其飛不知其誰伏如横弩起如發機黄帝曰何如而虚何如而實岐伯曰刺虛者須其實刺實者須其虚也留氣已至慎守勿失深淺在志逺近如一如臨深淵手如握虎神無營於衆物今列孔穴圖於後者銅人鍼灸經卷一
