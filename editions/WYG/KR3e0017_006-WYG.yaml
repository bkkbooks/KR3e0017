front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0017_WYG_006-1a, image: WYG0738/WYG0738-0040c.png}
body:
  text: 銅人鍼灸經卷六角孫二穴在耳郭中間開口有穴手足少陽手太陽之㑹主齒不嚼物齲動腫灸三壯針入三分耳門二穴在耳前起肉當耳缺者主耳有膿及底耳䁎耳耳痛鳴聾并齒齲針入三分灸三壯聽㑹二穴在耳前䧟中上闗下一寸動脉宛宛中張口得之手少陽脉氣所發針入三分主耳聾耳中状如弹聲通耳牙車急疼痛不得嚼食牙車脱臼相離一寸其穴側卧張口得之灸亦良天牖二穴在頸筋缺盆上天容後天柱前完骨下髪際上一寸䧟者宛宛中手少陽氣所發主頭風面腫項强不得囬轉夜夢顛倒面青黄無顔色針入五分不宜灸若灸面腫滿合先取譩譆後針天牖風池其病即差天府二穴在兩腋下三寸宛宛中手太隂脉氣所發主頭眩目瞑遠視􅉩􅉩針入四分灸入七壯不除再灸百壯甲乙經禁灸曲澤二穴者水也在肘内廉下䧟者中屈肘得之手心主脉之所入為合也主心痛出穴則心下澹澹喜驚身熱煩心口乾逆氣嘔血時瘈瘲言摇頭青汗出不過肩傷寒病温温身熱口乾灸三壯針入三分少海二穴者水也一名曲節手少隂脉之所入為合也在肘内横文頭屈手向頭取之䧟者宛宛中甲乙經云穴在肘内廉節後䧟者中動應手療腋下瘰癧痺疼屈伸不得風痺疼疰病針入三分禁灸巨虚上廉二穴在三里三寸兩筋兩骨罅間䧟者宛宛中足陽明與太陽合針入八分主大腸氣不足偏風腰腿脚不随不得履地脚氣刺風痶風脚冷寒瘧灸之太良條口二穴在上廉下一寸陽明脉氣所發主脛寒不得卧疼痛足緩失履濕痺足下熱不能久立針入八分灸三壯巨虚下廉二穴足陽明與小腸合在上廉下三寸兩筋兩骨罅䧟者宛宛中蹲地坐而取之針入六分又針入三分灸三壯主小腸氣不足面無顔色偏風熱風冷痺不遂風濕痺灸亦良不及針灸瘡差冷痺即已承山二穴一名魚腹山一名傷山在兌踹腸下分肉間䧟者中定腹取之主脚弱無力脚重偏風不遂針入八分灸亦得上崑崙二穴者火足太陽脉之所行為經也在外踝後跟骨上䧟者中治惡血風氣腫痛脚腫水針入五分灸三壯下崑崙二穴一名内崑崙在外踝下一寸大筋後内陷骨宛宛中主刺風􅀈風熱風冷痺腰疼偏風半身不遂脚重疼不履地針入四分灸之亦良其穴蹲地旁引刺之灸百壯止聽宫二穴在耳中珠子大如赤小豆形足少陽手太陽三脉之㑹針入一分灸三壯主耳聾填如無所聞嘬嘬嘈嘈弹鳴及心膓滿臂痛失聲缺盆上二穴肩上横骨䧟中一名天蓋肩上是穴主寒熱瘰癧缺盆中腫外潰不死胷中熱滿腹大小氣缺盆中痛汗出喉痺咳嗽灸三壯針入三分孔最二穴在腕上七寸手太隂郄治熱病汗不出吐血失瘖腫痛惡血針入三分灸亦得列缺二穴在腕上一寸半交叉頭兩筋兩骨罅宛宛中手太隂絡主療偏風口喎半身不遂針入三分灸亦得若患偏風灸至一百壯若患腕勞灸至妙經渠二穴者金也在寸口中䧟者中手太隂脉之所行為經也主寒熱胷背急痛胷中膨膨痛喉痺掌中熱主咳逆上氣喘數久熱病汗不出暴癉喘逆心痛欲嘔針入三分不可灸即傷人神少冲二穴者木也一名經如在手小指内廉之端去甲如韭葉手少隂脉之所出為井也主熱病煩心上氣心痛冷煩滿少氣悲恐喜驚掌熱肘腋胷中痛口中熱咽中酸乍寒熱手拳不伸掌痛引腋針入一分灸一壯勞宫二穴者火也一名五里在掌中央横文動脉中以屈無名指頭着處是手中主脉之所流為營也主手掌後􅍙痺手痺白屑起針入二分只過一度如過兩度令人虚不得灸灸即生息肉髀關二穴在膝上伏兎後交分中主脉寒不仁痺痿不屈伸也灸三壯針入三分梁丘二穴足陽明郄在膝上三寸兩筋間治大驚脛痛冷痺膝痛不能伸屈針入五分隱白二穴者木也足大指端内側去𤓰甲角如韭葉宛宛中足太隂脉之所出為井主腹中有寒熱起氣喘衂血不止腹中脹逆脛中寒熱不得卧氣滿胷中熱暴洩鬲中嘔吐不欲食飲渴尸厥不知人脉動如渴飲身體疼痛唾也針入一分灸三壯承筋二穴一名踹腸一名直腸在脛後從脚跟後上七寸踹中央䧟者中足太陽脉氣所發治風勞熱足煩腫痛轉筋急痛身隱疹大小便不止針入三分陽蹻二穴在外髁前一寸䧟者宛宛中治脚氣腎氣婦人血氣針入三分隂蹻二穴在足内踝陷者中宛宛是卒疝小腹痛病者左取右右取左立已女子不月水驚喜悲不樂如墮墜汗出面黒病饑不欲食婦人淋瀝隂挺出四支淫濼心悶暴虐及諸淋目痛小腹偏痛嘔逆嗜卧偏枯不能行大風暴不知人卧驚視如見星尿如黄水小腹熱咽乾也灸三壯針入三分風府一穴本在項後入髪際一寸大筋上宛宛中起肉疾言其肉立起言休立下督脉陽維之㑹不可灸針入三分主頭項急不可傾側目眩鼻窒不得息瘖不能言嗌痛足不仁狂走欲自殺目反妄視瘈脉二穴一名資脉在耳内雞足青脉是穴主頭風耳後痛小兒驚癎瘈瘲嘔吐洩注驚恐失精視瞻不明眩瞢灸三壯針入一分清冷淵二穴在肘上二寸伸肘舉臂取之主肩不舉不得帶衣灸三壯針入三分消濼二穴在肩下外關腋針肘分下行主寒熱風痺頭痛頭背急針入六分灸三壯肩外俞二穴在肩脾上㢘去脊三寸陷者中主肩甲痛熱而寒至肘灸一壯針入六分曲垣二穴在肩中央曲甲陷者中按之應手痛是穴主肩痛周痺灸三壯針入九分二閒一穴者水也一名閒谷在手太指次指本節前内側陷者中手陽明脈之所流為營也主喉痺多卧喜睡肩髃喉痺咽如眥物傷忽振寒針入三分灸三壯三間二穴者木也一名少谷在手大指次指本節之後内側陷者中手陽明脈之所注為俞也主喉痺咽如骨鯁齒齲痛多卧喜睡胷滿腹鳴虚寒熱唇口乾身熱喘息目急痛針入三分少澤二穴者金也一名少吉在手小指端去爪甲下一分陷者中手太陽脈之所出為井也主虐寒熱汗不出頭痛咳𠻳瘈瘲口乾頭痛不可顧也針入一分灸一壯前谷二穴者水也在手小指外側本節前䧟者中手太陽脉之所流營也刺入一分灸三壯主目眩􅁋􅁋轉甲小指痛陽谷二穴者火也在手外側腕中兌骨之下陷者中手太陽脉之所行為經也主顛疾狂走熱病汗不出脇痛頸腫寒熱耳聾耳鳴牙齒齲痛臂腕外側痛不舉吐舌戾頸妄言不得左右顧俛瘈瘲頭眩眼痛針入二分灸三壯飛陽二穴一名厥陽足太陽絡在外踝上七寸别走少隂者刺入三分灸三壯主頭眩目痛束骨二穴者木也在足小脂外本節後䧟者中足太陽脉之所注為俞也刺入三分灸三壯主頭痛目眩身熱肌肉動湧泉二穴者木也一名地冲在足心陷者中屈足捲指宛宛中足少隂脉之所出為并也主小便不利心中結熱脚底白肉際不得履地刺風脈風風癎灸亦得然不及針者灸廢人行動不可傳之於後針入五分膝眼四穴在膝頭骨下兩傍陷者宛宛中是穴針入五分留三呼㵼五吸主膝冷疼痛不已禁灸銅人鍼灸經卷六
