  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0017_WYG_005-1a, image: WYG0738/WYG0738-0035a.png}
body:
  text: 銅人鍼灸經卷五竅隂一穴在完骨上枕骨下足太陽少陽之㑹主骨疸發厲頭痛引頭也灸五壯針入三分浮白二穴在耳後入髪際一寸足太陽之㑹主寒熱喉痺欬逆疝積胷中滿不得喘息胷痛耳聾嘈嘈無所聞頸項癰腫不能言及癭肩不舉也針入三分灸三壯附分二穴在第二椎下附項内廉兩傍各三寸手足太陽之㑹主背痛引領灸五壯針入三分䰟户二穴在第三椎下兩傍各三寸宛宛中正坐取之足太陽脈氣所發主背脾悶無氣力勞損痿黄五尸走疰項强不得回顧針入五分灸亦得神堂二穴在第五椎下兩傍各三寸陷者中正坐取之足太陽脈氣所發主肩痛胷腹滿洒浙反脊强急灸五壯針入三分譩譆二穴在肩膊内廉第六椎兩傍三寸其穴抱肘取之足太陽脈氣所發因以手痛按之病者言譩譆針入六分主温瘧寒寒病病背悶氣滿腹脹氣眩灸二七壯忌葱白酒膏盲俞二穴主無所不療羸瘦虚損夢中失精上失氣欬逆狂或妄誤取穴之法令人正坐曲脊伸兩手以臂著膝前令正直手大指與膝頭齊以物支肘勿令臂得動也從甲骨上角摸索至骨下頭其間當有四肋三間灸中間依胛骨之裏去胛骨各容指許摩服去表肋間空處按之自覺牽引於肩中灸兩胛中一處至六百壯多至千壯當覺下􅀢􅀢然流水之狀亦當有所下出若得痰疾則無所不下也若病人已困不能正坐當令側卧俛上臂令前取穴灸之求穴法大校以右手從左肩上住指頭所不及者是也左亦然乃以前法灸之若不能久坐當伸兩臂令人俛兩胛骨俠相離不爾肘骨覆穴不可得也所伏衣襆當令大小有常定不爾則失其穴也此灸訖後令人陽氣康盛當消息以自補飬當取身體平復其穴近第五椎望取之也論曰昔在和緩不救晋侯之疾以其在膏之上肓之下針藥所不能及即此之穴是也人不能求得此穴所以宿病難追若能用心此方便求得灸之無疾不愈鬲關二穴在第七椎下兩傍各三寸䧟者中正坐取之足太陽脉氣所發主背痛惡寒脊强俛難食不下嘔噦多涎睡也灸五壯針入五分䰟門二穴在第九椎下兩傍各二寸䧟者中正坐取之足太陽脉氣所發主食飲不下腹中雷鳴大便不節小便赤黄也灸三壯針入五分陽綱二穴在第十椎下兩傍各三寸正坐取之足太陽脈氣所發主食不下腹中雷鳴大小便不節黄水灸三壯針入五分意舍二穴在第十一椎兩傍各三寸正坐取之足太陽脈氣所發主腹滿虚脹大便洩滑消渇面黄灸五十壯甲乙經灸三壯針入五分胃倉二穴在第十二椎下兩傍各三寸主腹内虚脹水食不消惡寒不能俛仰針入三分灸五壯盲門二穴在第十三椎下兩傍各三寸異經云與鳩尾相直主心下肓大堅婦人乳有餘疾灸三十壯針入五分志堂二穴在第十四椎下兩傍各三寸正坐取之是太陽脈氣所發針入五分灸三壯主腰脊痛急食不消腹中堅急隂痛下腫並療之胞肓二穴在第十四椎下兩傍各三寸陷者中伏而取之足太陽脈氣所發主腰脊痛急食不消腹中堅急隂痛下腫並療之療惡氣腰背卒痛灸五七壯甲乙經灸三壯針入五分秩邊二穴在第二十椎下兩傍各三寸伏而取之足太陽脈氣所發主腰痛不能俛仰小便赤黄尻重不能舉灸三壯針入三分頷厭二穴在曲踿顳顬上廉手足少陽陽明之交㑹刺入三分灸三壯主風眩目無所見偏頭痛引目外眥急耳鳴好啑頸痛客主二穴在耳前上廉起骨開口有穴動脉宛宛中一名上關足陽明之㑹主􅀈目風牙疼痛車不開口噤嚼食鳴偏風眼喎通睛耳聾狀如蝉聲針入一分灸七壯艾炷如筋頭大必湏側卧張口取穴避風又上關不得深下關不得久留針問曰上關何以不得深下關何以不得久留針答曰上關若深令人得欠不得㰦目隨針􅀈下關不得久留針者得㰦不得欠牙關急是故上關不得深下關不得久留針懸顱二穴在曲周顳顬中足陽明脉氣所發主熱病偏頭痛引目外内身熱煩滿汗不出齒痛面皮赤痛針入三分灸三壯肩井二穴在肩上䧟罅中缺盆上大骨前一寸半以三指按之當其中指下䧟者中是穴一名􅈩井手足少陽陽維之㑹主五勞七傷頭項不得囬顧背膊悶兩手不得向頭或因馬抝傷腰髖疼脚氣入針四分不宜灸針不得深深即令人悶甲乙經云針只可五分此膊井脉足陽明之㑹乃連入五臟氣若深便引五臟之氣乃令人短夀大肥人亦可倍之若悶倒不識人即湏三里下氣雖不悶倒但針􅈩并即湏三里下氣大良及婦人懷胎落訖覺後㣲損手足苦者針肩井手足立差若有灼然解針者遣針不解針者不可遣針灸乃勝針日灸七壯若針肩井必三里下氣如不灸三里即拔氣上其針􅈩并出甄權經扁髃二穴在膊骨頭肩端兩骨間陷者宛宛中是平手足其穴手陽明蹻脈之會針入八分主療偏風半身不遂熱風疹風胷俛仰風刺風風虚手不得上頭捉物不得挽弓不開臂細無力酸疼臂冷而緩患刺風者百日刺筋百日刺骨方可得瘳灸亦得然不及針還以平手取其穴日灸七壯差為度臂臑二穴在肩髃下一寸兩筋間兩骨罅陷者宛宛中宜灸不宜針日灸七壯主療勞癭臂細無力手不得向頭其穴平手取之不得拏手令急其穴即閉若針不得過三五過多生惡曲池二穴者木也在肘外輔骨曲肘横文頭宛宛中陷者是手陽明脈之所入為合也手拱胷取之外畔文頭即是療偏風半身不遂刺風疹疼痛冷緩捉物不得挽弓不開屈伸難引脈風臂肘細而無力針入七分灸亦良但令斷風抽氣而已通谷二穴在夾上管兩傍相去三寸冲脈足少隂之㑹治乾嘔又無所出又治勞食欲鬲結針入五分灸五壯章門二穴一名長平一名脇􅡍是脾之募在大横外直臍季肋端必須側卧令伸下脚縮上脚乃得穴足厥隂少陽之㑹主膀胱氣癖疝瘕氣膀胱氣痛狀如雷聲積聚氣針入六分灸亦良伏􅇠二穴在膝上六寸起肉正跪坐取之足陽明脈氣所發治風勞痺逆狂邪膝冷手節攣縮身隠疹腹脹少氣婦人八部諸病針入三分禁灸隂市二穴一名隂鼎在膝上三寸伏兎下是穴足陽明脈氣所發主寒疝下至腰脚如冷水小腸諸疝按之在膝上伏兎下寒疝腹脹滿痿厥少氣針入三分灸三壯犢鼻二穴在膝臏下骭侠罅大筋中足陽明脈氣所發主犢鼻腫洗熨去之其久堅勿攻攻者死膝中痛不仁難跪起諸腫節潰者死不潰可療針入三分灸三壯委中二穴者土也在膕中央約文中動脈甄權云在曲䐐内兩筋兩骨中宛宛是足太陽脈氣之所入為合也令人面挺腹地而取之主脚弱無力風濕痺筋急半身不遂灸不及針針入八分灸三壯三里二穴者土也在膝下三寸䯒外㢘陷者宛宛中是足陽明脈之所入為合也主腰滿堅塊不能食胷氣不足反胃胷脇積氣脚弱針腹背毎須取三里穴入八分灸亦良銅人鍼灸經卷五
