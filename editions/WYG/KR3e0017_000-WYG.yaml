body:
  text: 銅人鍼灸經醫家類提要臣等謹案銅人鍼灸經七卷不著撰人名氏按晁公武讀書後志曰銅人腧穴鍼灸圖三卷皇朝王惟徳撰仁宗嘗詔惟徳攷次鍼灸之法鑄銅人為式分臟腑十二經旁注腧穴所㑹刻題其名併為圖法及主療之術刻板傳於世王應麟玉海曰天聖五年十月壬辰醫官院上所鑄腧穴銅人式二詔一置醫官院一置大相國寺仁濟殿先是上以鍼砭之法𫝊述不同命尚藥奉御王惟一考明堂氣穴經絡之㑹鑄銅人式又纂集舊聞訂正訛謬為銅人腧穴鍼灸圖經三卷至是上之摹印頒行翰林學士夏竦序所言與晁氏畧同惟王惟徳作惟一人名小異耳此本卷數不符而大致與二家所言合疑或天聖之舊本而後人析為七卷歟周宻齊東野語曰嘗聞舅氏章叔恭云昔倅襄州日嘗獲試鍼銅人全像以精銅為之腑臟無一不具其外腧穴則錯金書穴名於旁凡背面二器相合則渾然全身葢舊都用此以試醫士者其法外塗黄蠟中實以水俾醫工以分析寸按穴試鍼中穴則鍼入而水出稍差則鍼不可入矣亦竒巧之器也後趙南仲歸之内府叔恭嘗寫二圖刻梓以𫝊焉今宋銅人及章氏圖皆不𫝊惟此書存其梗槪爾乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2e34f0f5eeb688405b4f926296c55b6bcb5cd0180dde2a3d5462a0924dd6f0b3
